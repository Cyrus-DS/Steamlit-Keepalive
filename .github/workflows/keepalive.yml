name: Keep Streamlit Awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        run: |
          APP_URL="https://ndundu-finance-appgit-5xrzkytijl5kizazc5uxav.streamlit.app/#generate-statements"
          echo "Pinging: $APP_URL"
          curl -L -I -sS "$APP_URL"
          curl -L -sS -o /dev/null -w "HTTP %{http_code}\n" "$APP_URL"
